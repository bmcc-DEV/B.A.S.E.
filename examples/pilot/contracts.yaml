# Pilot temporal contracts (Saleae-compatible event types: mmio_write / mmio_read / irq)
- name: uart_init_to_irq
  steps:
    - event_type: mmio_write
      address: 0x40034000
      value: 1
      tolerance_ns: 100
    - event_type: mmio_read
      address: 0x40034004
      value: null
      tolerance_ns: 200
    - event_type: irq
      address: 0x10
      value: null
      tolerance_ns: 200
  max_total_ns: 5000
  max_step_ns: 3000
  order: Strict

- name: uart_tx_byte
  steps:
    - event_type: mmio_write
      address: 0x40034000
      value: 65
      tolerance_ns: 50
    - event_type: irq
      address: 0x10
      value: null
      tolerance_ns: 100
  max_total_ns: 2000
  max_step_ns: 1500
  order: Strict

