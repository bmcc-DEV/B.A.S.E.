# T1 B2 — contratos temporais SPI0 @ 0x4003c000 (RP2040-style PL022)
- name: spi_init_to_irq
  steps:
    - event_type: mmio_write
      address: 0x4003c000
      value: 1
      tolerance_ns: 100
    - event_type: mmio_read
      address: 0x4003c00c
      value: null
      tolerance_ns: 200
    - event_type: irq
      address: 0x11
      value: null
      tolerance_ns: 200
  max_total_ns: 5000
  max_step_ns: 3000
  order: Strict

- name: spi_xfer_byte
  steps:
    - event_type: mmio_write
      address: 0x4003c008
      value: 85
      tolerance_ns: 50
    - event_type: irq
      address: 0x11
      value: null
      tolerance_ns: 100
  max_total_ns: 2000
  max_step_ns: 1500
  order: Strict
