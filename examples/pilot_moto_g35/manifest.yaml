# Manifest — Moto G35 5G OS-port validation assist (≠ pmOS turnkey)

target:
  device: moto_g35_5g
  codename: manila
  soc: Unisoc UMS9620
  isa: aarch64
  stock_os: Android 14
  port_os: postmarketOS  # tree externo via pmbootstrap — não gerado pelo B.A.S.E.

phases:
  A: forense_contracts   # run.sh / run_path_a.sh
  B: qemu_smoke          # run_qemu_smoke.sh / Specter
  C: hardware_boot       # SOP.md + hw_boot_receipt

fixtures:
  boot_img: boot.img     # ANDROID! synth ou dump real
  mmio: mmio.json
  contracts: contracts.yaml

honesty:
  auto_flash_complete: false
  production: false
  generates_os: false
  generates_tauros: false
  note: "port_os=postmarketOS; ToaruOS/UT não são o alvo do wedge G35"
